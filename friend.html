<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>友链</title>
<link rel="stylesheet" href="styles.css?v=1" type="text/css">

<style>
body {
  margin: 0;
  padding: 20px;
  background: #f5f5f5;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

.friend-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}

.friend-card {
  border-radius: 13px;
  overflow: hidden;
  background: #ffffff;
  text-decoration: none;
  color: #333;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
  transition: transform 0.2s ease;
}

.friend-card:hover {
  transform: translateY(-3px);
}

.friend-cover {
  height: 110px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 48px;
  font-weight: 600;
  background: #fafafa;
  color: #999;
}

.friend-content {
  padding: 16px;
}

.friend-desc {
  font-size: 14px;
  line-height: 1.6;
  color: #666;
}

.pin-label {
  display: inline-block;
  background: #FFBABA;
  color: #fff;
  font-size: 10px;
  font-weight: bold;
  padding: 2px 5px;
  border-radius: 4px;
  margin-right: 6px;
  vertical-align: middle;
}
</style>
</head>

<body>

<h1>Friends.</h1>

<div class="friend-grid" id="topFriends"></div>

<br>
<hr align="center" width="50%">
<br>

<div class="friend-grid" id="normalFriends"></div>

<script>
const friends = [
  {
    name: "Karina.xin🍥琳•心",
    url: "https://karina.xin",
    desc: "放弃就到此为止啦....",
    top: true
  },
  {
    name: "vegecaiBlog",
    url: "https://kwicaii.moe",
    desc: "守岁花开，季季不同"
  },
  {
    name: "寒冰是喵喵",
    url: "https://blog.hanbings.io",
    desc: "欢迎来到我的小世界"
  },
  {
    name: "桐高音游部",
    url: "https://www.inm.wiki",
    desc: "https://www.inm.wiki"
  },
  {
    name: "石猫博客",
    url: "https://imshimao.com",
    desc: "https://imshimao.com"
  },
  {
    name: "青序栈",
    url: "https://www.qixz.cn",
    desc: "青序成栈·向简而生"
  },
  {
    name: "Duo 云站",
    url: "https://www.mduo.cloud",
    desc: "MathForest官方🌲|程序及数学可视化✨|屑魔女游世界🔮"
  },
];

const topContainer = document.getElementById("topFriends");
const normalContainer = document.getElementById("normalFriends");

function stringToColor(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    hash = str.charCodeAt(i) + ((hash << 5) - hash);
  }
  const h = hash % 360;
  return `hsl(${h}, 60%, 94%)`;
}

function createCard(friend) {
  const card = document.createElement("a");
  card.href = friend.url;
  card.className = "friend-card";
  card.target = "_blank";

  const firstLetter = friend.name.trim().charAt(0);

  const pinLabel = friend.top ? `<span class="pin-label">PIN</span>` : '';

  card.innerHTML = `
    <div class="friend-cover">${firstLetter}</div>
    <div class="friend-content">
      <div class="friend-title">${pinLabel}${friend.name}</div>
      <div class="friend-desc">${friend.desc}</div>
    </div>
  `;

  return card;
}

friends.forEach(friend => {
  const card = createCard(friend);

  if (friend.top) {
    topContainer.appendChild(card);
  } else {
    normalContainer.appendChild(card);
  }
});
</script>

</body>
</html>
