<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>申根区-友情连结</title>

<style>
body {
  margin: 0;
  padding: 20px;
  background: #D4E1E0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

/* 网格布局 */
.app-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(75px, 1fr));
  gap: 12px;
}

/* 卡片 */
.app-card {
  text-decoration: none;
  color: #000000;
  text-align: center;
}

/* 圆形图标 */
.app-icon {
  height: 65px;
  width: 65px;
  margin: auto;
  border-radius: 50%;
  border: 1px solid #ddd;
  background: rgba(255,255,255,0.35);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);

  display: flex;
  align-items: center;
  justify-content: center;

  font-size: 24px;
  font-weight: bold;

  transition: 0.3s;
}

.app-icon:hover {
  transform: scale(1.08);
}

/* 名称标题 */
.app-title {
  margin-top: 8px;
  font-size: 14px;
  font-weight: bold;
}

h1 { 
  margin-bottom: 0px;
}

p { 
  margin-top: 7px;
  font-weight: bold;
  color: rgba(0,0,0,0.7);
}

</style>
</head>

<body>

<h1>Schengen Links.</h1>
<p>加入成为 @Karina 的申根区会员</p>
<br>

<div class="app-grid" id="appGrid"></div>

<script>
const apps = [
  { name:"Karina.xin", url:"https://karina.xin"},
  { name:"Sakuras.in", url:"https://sakuras.in"},
  { name:"VegecaiBlog", url:"https://kwicaii.moe"},
  { name:"寒冰是喵喵", url:"https://blog.hanbings.io"},
  { name:"桐高音游部", url:"https://www.inm.wiki"},
  { name:"石猫博客", url:"https://imshimao.com"},
  { name:"青序栈", url:"https://www.qixz.cn"},
  { name:"Duo 云站", url:"https://www.mduo.cloud"},
  { name:"J的个人博客", url:"https://blog.jsoftstudio.top"},
  { name:"自时的小栈", url:"https://zsvhc.cc.cd"},
  { name:"林King社区", url:"https://wyuanlin.top"},
  { name:"智宇的小站", url:"https://zhiyuhub.top"},
  { name:"Yuyu的博客", url:"https://yuyu09.com"},
  { name:"小猫乐园", url:"https://www.catpark.top"},
  { name:"Zplbの博客", url:"https://blog.zplb.top"},
  { name:"阿叶Ayeez的小站", url:"https://blog.Ayeez.cn"},
  { name:"千纸雏鸢", url:"https://m.qzcy2.top"},
  { name:"沐光橙香", url:"https://mugcx.com"},
];

const grid = document.getElementById("appGrid");

apps.forEach(app => {

  // 自动取第一个字符作为图标
  const icon = app.name.trim().charAt(0);

  const card = document.createElement("a");
  card.href = app.url;
  card.className = "app-card";
  card.target = "_blank";

  card.innerHTML = `
    <div class="app-icon">${icon}</div>
    <div class="app-title">${app.name}</div>
  `;

  grid.appendChild(card);
});
</script>

</body>
</html>
