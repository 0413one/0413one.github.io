<!DOCTYPE html>
<html>
<head>
<title>yominsky</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<style>
#quotes{
  max-width:700px;
  margin:auto;
  padding:7px;
}

.quote{
  padding:16px 0;
  border-bottom:1px solid #eee;
}

.quote p{
  margin:0;
  line-height:1.8;
}

.com{
  font-size:12px;
  color:#999;
}
</style>

<body bgcolor="#ffffff">
<div id="quotes"></div>

<script>
const quotes = [
{ text:"在路上散步 想到可以做这个动态 于是就有了这个页面 我会慢慢把一些内容填进来的 因为Qz网页版访客好像要登录那些什么的 唔..一些突发奇想了啦", time:"2026-03-11", more:"Serbia" },
{ text:"Karina.xin 的GitHub仓库 总共有3个Star啦 非常感谢小伙伴们的支持么么么", time:"2026-03-10", more:"Serbia" },
{ text:"Test", time:"1970-01-01", more:"Unknown" },
];
</script>

<script>
const container = document.getElementById("quotes");

quotes.forEach(item => {

  const div = document.createElement("div");
  div.className = "quote";

  div.innerHTML = `
    <p>${item.text}</p>
    <span class="com">${item.time}</span>
    <span class="com">From ${item.more}</span>
  `;

  container.appendChild(div);

});
</script>
</body>
</html>
