<!DOCTYPE html>
<html>
<head>
<title>yominsky</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<style>
#quotes{
  max-width:700px;
  margin:auto;
  padding:7px;
}

.quote{
  padding:16px 0;
  border-bottom:1px solid #eee;
}

.quote p{
  margin:0;
  line-height:1.8;
}

.com{
  font-size:12px;
  color:#999;
}
</style>

<body bgcolor="#ffffff">
<div id="quotes"></div>

<script>
const quotes = [
{ text:"我们重制了yominsky24版", time:"2026-03-14", more:"Serbia" },
{ text:"應当要怎么办呢...", time:"2026-03-13", more:"Serbia" },
{ text:"1+1=2 2=1.5+0.5 我的意思是 纵然结果同样 但不一样", time:"2026-03-12", more:"Serbia" },
{ text:"深思熟虑之后还是在主站加入了私人联络方式 如果您希望交朋友的话 可以使用主页中的小按钮来添加我 原来想做成诸如短视频平台中的follow大按钮 因为或许是有用户可能会对于大按钮比较有压力 以及我顾虑文字会被爬虫那些抓取到用于发送垃圾信箱等事件 所以还是折中选了小按钮 之前其实也有放过 但后来最终还是删除了 (不是因此或不只是因此)有遭遇到骚扰 所以比较困扰对此 我主观认为我是一个很包容开放的人的 只要不太过火都OK 对此不要有太多压力了喔", time:"2026-03-12", more:"Serbia" },
{ text:"在路上散步 想到可以做这个动态 于是就有了这个页面 我会慢慢把一些内容填进来的 因为Qz网页版访客好像要登录那些什么的 唔..一些突发奇想了啦", time:"2026-03-11", more:"Serbia" },
{ text:"Karina.xin 的GitHub仓库 总共有3个Star啦 非常感谢小伙伴们的支持么么么", time:"2026-03-10", more:"Serbia" },
{ text:"Test", time:"1970-01-01", more:"Unknown" },
];
</script>

<script>
const container = document.getElementById("quotes");

quotes.forEach(item => {

  const div = document.createElement("div");
  div.className = "quote";

  div.innerHTML = `
    <p>${item.text}</p>
    <span class="com">${item.time}</span>
    <span class="com">From ${item.more}</span>
  `;

  container.appendChild(div);

});
</script>
</body>
</html>
